<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostr DM Chat</title>
    <style>
        :root {
            --bg: #0b0d10;
            --surface: #13171f;
            --border: rgba(255,255,255,0.09);
            --text: #e7edf5;
            --muted: #8a97a8;
            --accent: #5b8ef0;
            --me-bg: rgba(91,142,240,0.12);
            --me-border: rgba(91,142,240,0.3);
            --ai-bg: rgba(255,255,255,0.04);
            --ai-border: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            font-size: 14px;
        }
        /* ── Full-height flex column ── */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 780px;
            margin: 0 auto;
        }
        /* ── Top bar ── */
        .topbar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        .topbar-title {
            font-weight: 600;
            font-size: 15px;
            flex: 1;
        }
        .status {
            font-size: 11px;
            padding: 3px 9px;
            border-radius: 999px;
            border: 1px solid var(--border);
            color: var(--muted);
        }
        .status.ok   { color: #7ed897; border-color: rgba(126,216,151,0.3); }
        .status.bad  { color: #f07070; border-color: rgba(240,112,112,0.3); }
        .status.warn { color: #f0c060; border-color: rgba(240,192,96,0.3); }
        .btn-ghost {
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        /* ── Info bar (pubkeys) ── */
        .infobar {
            flex-shrink: 0;
            display: flex;
            gap: 16px;
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
            flex-wrap: wrap;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
        }
        .info-label { color: var(--muted); white-space: nowrap; }
        .info-val {
            font-family: ui-monospace, monospace;
            font-size: 11px;
            color: var(--text);
            opacity: 0.7;
        }
        /* ── Messages ── */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg {
            max-width: 75%;
            padding: 9px 13px;
            border-radius: 14px;
            border: 1px solid var(--border);
            line-height: 1.5;
        }
        .msg.me {
            align-self: flex-end;
            background: var(--me-bg);
            border-color: var(--me-border);
            border-bottom-right-radius: 4px;
        }
        .msg.ai {
            align-self: flex-start;
            background: var(--ai-bg);
            border-color: var(--ai-border);
            border-bottom-left-radius: 4px;
        }
        .msg-meta {
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .msg-body { white-space: pre-wrap; word-break: break-word; }
        /* ── Composer ── */
        .composer {
            flex-shrink: 0;
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            align-items: flex-end;
        }
        .composer textarea {
            flex: 1;
            resize: none;
            min-height: 42px;
            max-height: 140px;
            padding: 10px 13px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            line-height: 1.4;
            outline: none;
        }
        .composer textarea:focus { border-color: rgba(91,142,240,0.4); }
        .composer button {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            align-self: flex-end;
            white-space: nowrap;
        }
        .composer button:disabled { opacity: 0.5; cursor: not-allowed; }
        .composer button:hover:not(:disabled) { filter: brightness(1.1); }
    </style>
</head>
<body>
    <div class="app">

        <div class="topbar">
            <span class="topbar-title">DM Chat</span>
            <span class="status warn" id="status">connecting…</span>
            <button class="btn-ghost" id="resetKeysBtn">Reset keys</button>
        </div>

        <div class="infobar">
            <div class="info-item">
                <span class="info-label">You</span>
                <span class="info-val" id="ownerPubkey">—</span>
            </div>
            <div class="info-item">
                <span class="info-label">AI</span>
                <span class="info-val" id="recipientPubkey">—</span>
            </div>
        </div>

        <div class="messages" id="chat"></div>

        <form class="composer" id="composer">
            <textarea id="input" placeholder="Message the AI… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
            <button id="sendBtn" type="submit">Send</button>
        </form>

    </div>
    <script type="module" src="./bundle.js"></script>
</body>
</html>
